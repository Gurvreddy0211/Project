<!DOCTYPE html>
<html>

<head>

<title>Smart Queue - Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:"Segoe UI",Arial;
background:#f1f5f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}


.login-card{

background:white;
padding:35px;
width:350px;
border-radius:10px;
box-shadow:0 6px 18px rgba(0,0,0,0.1);

}

h2{
text-align:center;
margin-bottom:25px;
}



input{

width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;

}



label{
font-size:14px;
font-weight:500;
}



button{

width:100%;
margin-top:18px;
padding:12px;
border:none;
background:#2563eb;
color:white;
font-size:15px;
border-radius:6px;
cursor:pointer;

}

button:hover{
background:#1e4fd6;
}


.footer{
text-align:center;
margin-top:15px;
font-size:14px;
}

.footer a{
color:#2563eb;
text-decoration:none;
}

.logo{
text-align:center;
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.error{
color:red;
text-align:center;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">🏥 Smart Queue</div>

<h2>Login</h2>

<form id="loginForm">

<label>Email</label>
<input type="email" id="email" required>

<br><br>

<label>Password</label>
<input type="password" id="password" required>

<button type="submit">Login</button>

</form>

<div class="error" id="errorMsg"></div>

<div class="footer">

Don't have an account?  
<a href="/register">Register</a>

</div>

</div>

<script>

document.getElementById("loginForm").onsubmit = async function(e){

e.preventDefault()

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let response = await fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:email,
password:password

})

})

let data = await response.json()

if(data.user){

localStorage.setItem("user_id",data.user.id)
localStorage.setItem("user_role",data.user.role)
localStorage.setItem("user_email",data.user.email)
localStorage.setItem("user_name",data.user.name)

if(data.user.role === "admin"){

window.location="/admin_dashboard.html"

}else{

window.location="/user_dashboard.html"

}

}
else{

document.getElementById("errorMsg").innerText="Login failed"

}

}

</script>

</body>

</html>
